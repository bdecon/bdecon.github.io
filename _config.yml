title: BD Economics
url: https://bd-econ.com

plugins:
  - jekyll-sitemap

# Tutorial pages live in _tutorials/ and render at /<name>.html.
# Each file has front matter — see CLAUDE.md "Tutorials collection" section
# for the schema (order, listed, featured, difficulty, accent, banner, deck...).
collections:
  tutorials:
    output: true
    permalink: /:name.html

# Defaults applied by `scope`.
# - Tutorials get layout: default automatically.
# - Specific files/dirs excluded from sitemap (remain publicly accessible).
defaults:
  - scope: { path: "", type: "tutorials" }
    values: { layout: default }
  - scope: { path: "CV.pdf" }
    values: { sitemap: false }
  - scope: { path: "MacroDash.pdf" }
    values: { sitemap: false }
  - scope: { path: "Dash" }
    values: { sitemap: false }

# Dirs/files Jekyll should NOT copy to _site
exclude:
  - Gemfile
  - Gemfile.lock
  - Makefile
  - vendor
  - CLAUDE.md
  - DESIGN.md
  - README.md
  - notebooks
  - sandbox
  - test-results
  - docs
  - "scripts/__pycache__"
  - "scripts/*.py"
  - "scripts/sync.sh"
  - "scripts/reorder_head.py"

# Files Jekyll should treat as static (no Liquid processing) even if they look like includes
keep_files:
  - .git

# Output files at their source path (e.g., about.html → /about.html).
# Do NOT use "pretty" permalinks here — it would output about/index.html
# and break existing inbound links.
