name: Update Release Calendar

on:
  schedule:
    # Run weekly on Sunday at 10 PM UTC (6 PM ET winter, 5 PM ET summer)
    - cron: '0 22 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_calendar.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet files/calendar.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add files/calendar.json
          git commit -m "Update release calendar"
          git push
