# Email new blog posts to Buttondown subscribers.
#
# Triggers AFTER the "Build and deploy site" workflow finishes successfully,
# so by the time the email fires the post's permalink is already live on
# bd-econ.com.
#
# OPT-IN MODEL: posts default to NOT emailing. The workflow only sends a
# post that has `email: true` in its front matter. Push a post without
# the flag → site updates, no email. To email: add `email: true`, commit,
# push. (See scripts/email_new_posts.py docstring for full details.)
#
# Other safety layers:
#   - 3-day window — posts older than that are ignored (no retroactive blast)
#   - metadata.post_slug dedup — re-runs can't double-send
#   - published: false honored
#
# Required repo secret: BUTTONDOWN_API_KEY
# Set at: Settings → Secrets and variables → Actions → New repository secret

name: Email new posts

on:
  # Fire after the Jekyll deploy workflow finishes successfully.
  workflow_run:
    workflows: ["Build and deploy site"]
    types: [completed]
    branches: [master]
  # Allow manual runs for testing.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually send)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: email-new-posts
  cancel-in-progress: false

jobs:
  send:
    # Don't run if the upstream deploy failed (no point emailing about a
    # post whose page isn't live).
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pyyaml

      - name: Email new posts
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: python3 scripts/email_new_posts.py
