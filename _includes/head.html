	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ page.title }}</title>
{% if page.extra_head %}{{ page.extra_head }}
{% endif %}	<link rel="stylesheet" href="/style.css">
{% if page.head_scripts %}{{ page.head_scripts }}
{% endif %}	<meta name="description" content="{{ page.description }}">
{% if page.keywords %}	<meta name="keywords" content="{{ page.keywords }}">
{% endif %}	<meta name="author" content="Brian Dew">
	<link rel="canonical" href="{{ page.canonical }}">
	<!-- Open Graph -->
	<meta property="og:title" content="{{ page.og_title | default: page.title }}">
	<meta property="og:description" content="{{ page.og_description | default: page.description }}">
	<meta property="og:url" content="{{ page.canonical }}">
	<meta property="og:type" content="{{ page.og_type | default: 'website' }}">
	<meta property="og:image" content="{{ page.og_image | default: 'https://bd-econ.com/images/01_bdlogo.png' }}">
	<!-- Twitter Card -->
	<meta name="twitter:card" content="{{ page.twitter_card | default: 'summary' }}">
	<meta name="twitter:title" content="{{ page.og_title | default: page.title }}">
	<meta name="twitter:description" content="{{ page.og_description | default: page.description }}">
	<meta name="twitter:image" content="{{ page.og_image | default: 'https://bd-econ.com/images/01_bdlogo.png' }}">
	<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
	<link rel="manifest" href="/favicon/manifest.json">
	<meta name="theme-color" content="#ffffff">
	{% feed_meta %}
<script>
(function() {
	const saved = localStorage.getItem('theme');
	if (saved) {
		document.documentElement.setAttribute('data-theme', saved);
	} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
		document.documentElement.setAttribute('data-theme', 'dark');
	}
})();
</script>

{{ page.jsonld }}
</script>
